<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Which Meme Are You?</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Which Meme Are You?</h1>
    <p>Answer a few fun questions to find out your meme identity!</p>

    <div id="quiz">
      <div class="question" id="questionText"></div>
      <div id="options"></div>
    </div>

    <div id="result" class="hidden">
      <h2>Your Meme Result:</h2>
      <p id="memeName"></p>
      <p id="memeDescription"></p>
      <button id="retryBtn">Try Again</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
